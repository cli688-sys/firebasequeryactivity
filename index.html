<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Firestore Query Assignment</title>

    <!-- Optional styling (Bulma for quick clean UI) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
  </head>

  <body class="section">
    <div class="container">
      <h1 class="title">Firestore Assignment</h1>

      <!-- ========================= -->
      <!-- ADD PERSON FORM -->
      <!-- ========================= -->
      <div class="box">
        <h2 class="subtitle">Add Person</h2>

        <input id="name" class="input mb-2" placeholder="Name" />
        <input id="age" class="input mb-2" placeholder="Age" />
        <input id="favcolor" class="input mb-2" placeholder="Favorite Color" />

        <button id="submit" class="button is-primary">Add Person</button>
      </div>

      <!-- ========================= -->
      <!-- DISPLAY PEOPLE -->
      <!-- ========================= -->
      <div class="box">
        <h2 class="subtitle">People in Database</h2>
        <div id="all_people"></div>
      </div>

      <!-- ========================= -->
      <!-- TEAMS SECTION -->
      <!-- ========================= -->
      <div class="box">
        <h2 class="subtitle">Teams</h2>

        <button onclick="add_teams()" class="button is-link mb-2">
          Add Teams (Run Once)
        </button>

        <button onclick="show_teams()" class="button is-info mb-2">
          Show Teams
        </button>

        <button onclick="update_teams()" class="button is-warning mb-2">
          Update Teams
        </button>

        <button onclick="add_colors()" class="button is-danger mb-2">
          Add Jersey Colors
        </button>

        <div id="teams" class="mt-3"></div>
      </div>

      <!-- ========================= -->
      <!-- QUERY RESULTS -->
      <!-- ========================= -->
      <div class="box">
        <h2 class="subtitle">Query Results</h2>

        <button onclick="q_spain()" class="button is-light mb-1">
          Teams in Spain
        </button>

        <button onclick="q_madrid()" class="button is-light mb-1">
          Teams in Madrid
        </button>

        <button onclick="q_national()" class="button is-light mb-1">
          National Teams
        </button>

        <button onclick="q_not_spain()" class="button is-light mb-1">
          Not Spain
        </button>

        <button onclick="q_not_spain_england()" class="button is-light mb-1">
          Not Spain/England
        </button>

        <button onclick="q_spain_700()" class="button is-light mb-1">
          Spain >700M Fans
        </button>

        <button onclick="q_500_600()" class="button is-light mb-1">
          500–600M Fans
        </button>

        <button onclick="q_ronaldo()" class="button is-light mb-1">
          Ronaldo Teams
        </button>

        <button onclick="q_big3()" class="button is-light mb-1">
          Ronaldo/Messi/Maradona
        </button>

        <div id="queries" class="mt-4"></div>
      </div>
    </div>

    <!-- ========================= -->
    <!-- FIREBASE (COMPAT VERSION) -->
    <!-- ========================= -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Your JS -->
    <script src="app.js"></script>
  </body>
</html>
